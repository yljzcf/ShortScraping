<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShortScraping - 短剧监控</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- 头部导航 -->
    <header class="header">
      <div class="category-tabs" id="categoryTabs">
        <button type="button" class="category-tab" data-source="imdb" title="IMDB" aria-label="IMDB"><img src="../../assets/icons/site-imdb.png" alt=""></button>
        <button type="button" class="category-tab" data-source="steam" title="Steam" aria-label="Steam"><img src="../../assets/icons/site-steam.png" alt=""></button>
        <button type="button" class="category-tab" data-source="royalroad" title="RoyalRoad" aria-label="RoyalRoad"><img src="../../assets/icons/site-royalroad.png" alt=""></button>
        <button type="button" class="category-tab" data-source="mydrama" title="MyDrama" aria-label="MyDrama"><img src="../../assets/icons/site-mydrama.png" alt=""></button>
        <button type="button" class="category-tab" data-source="reelshort" title="ReelShort" aria-label="ReelShort"><img src="../../assets/icons/site-reelshort.png" alt=""></button>
        <button type="button" class="category-tab" data-source="dramashorts" title="DramaShorts" aria-label="DramaShorts"><img src="../../assets/icons/site-dramashorts.png" alt=""></button>
        <button type="button" class="category-tab" data-source="netshort" title="NetShort" aria-label="NetShort"><img src="../../assets/icons/site-netshort.png" alt=""></button>
      </div>
      <div class="header-actions">
        <button id="btnTranslateAll" class="btn-icon" title="全部翻译：检查所有待翻译条目并开始翻译">🌐</button>
        <button id="btnSettings" class="btn-icon" title="设置">⚙️</button>
      </div>
    </header>

    <!-- 状态栏：左侧同步服务，右侧版本 -->
    <section class="status-bar">
      <div class="sync-service" id="syncServiceStatus" title="正在检测本地 CSV 同步服务">
        <button id="btnSyncFolder" class="sync-inline-btn" title="打开同步服务脚本所在文件夹（需先运行 server/setup-launcher.bat 注册；未注册时复制路径）">📁</button>
        <span class="sync-service-dot" aria-hidden="true"></span>
        <span id="syncServiceText">同步服务：检测中</span>
        <button id="btnSyncStart" class="sync-inline-btn sync-start-btn hidden" title="一键启动同步服务（需先运行 server/setup-launcher.bat 注册）">▶ 启动</button>
        <span class="sync-service-hint">点击刷新状态</span>
      </div>
      <div class="version-status" id="versionStatus" title="正在检查远端版本">
        <span class="version-status-dot" aria-hidden="true"></span>
        <span id="versionStatusText">版本：检查中</span>
      </div>
      <!-- 临时提示条：绝对定位悬浮于状态栏正下方，刷新结果/操作提示，自动消失 -->
      <div id="toastBar" class="toast-bar hidden" aria-live="polite"></div>
    </section>

    <!-- 内容区域 -->
    <main class="content">
      <!-- 时间线视图 -->
      <div id="timelineView" class="view active">
        <div class="timeline-container">
          <!-- 动态生成 -->
        </div>
      </div>

      <!-- 空状态 -->
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">📺</div>
        <h3>暂无监控数据</h3>
        <p>该分类下还没有数据，请先访问对应榜单页面并点击抓取按钮</p>
        <button id="btnGoScrape" class="btn-primary">前往榜单页面</button>
      </div>

      <!-- 加载状态 -->
      <div id="loadingState" class="loading-state hidden">
        <div class="spinner"></div>
        <p>正在加载数据...</p>
      </div>
    </main>

    <!-- 底部状态栏 -->
    <footer class="footer">
      <div class="status">
        <span class="status-dot"></span>
        <span id="statusText">就绪</span>
      </div>
      <div class="lan-share" id="lanShare" title="局域网共享链接">
        <span class="lan-share-icon" aria-hidden="true">📡</span>
        <span id="lanShareText">检测中</span>
        <button id="btnLanQr" class="lan-qr-btn hidden" title="显示二维码，手机扫码打开">▦</button>
      </div>
      <div class="stats">
        <span id="statsTotal">0 部短剧</span>
        <span class="divider">|</span>
        <span id="statsLastUpdate">未更新</span>
      </div>
    </footer>

    <!-- 局域网链接二维码浮层 -->
    <div id="lanQrPopover" class="lan-qr-popover hidden">
      <canvas id="lanQrCanvas" width="0" height="0"></canvas>
      <div class="lan-qr-url" id="lanQrUrl"></div>
    </div>
  </div>

  <script src="../shared/url-match.js"></script>
  <script src="../shared/timeline-render.js"></script>
  <script src="../shared/qrcode.js"></script>
  <script src="../shared/translator.js"></script>
  <script src="popup.js"></script>
</body>
</html>
